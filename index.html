<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREST Among Us - Hub</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .section-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            max-width: 600px;
            width: 100%;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent-cyan);
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 4px;
            background: #333;
            color: white;
            border: 1px solid var(--accent-cyan);
        }
        .hub-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .auth-status {
            text-align: right;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 600px;
        }
        .task-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .task-row input {
            padding: 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="hub-layout">
        <h1 class="glitch-text" style="text-align: center;">GREST Among Us</h1>
        <p class="subtitle">Multiplayer Platform</p>

        <div class="auth-status" id="auth-status">
            Stato: <span id="user-status-text">Non loggato</span>
            <button id="btn-logout" class="btn btn-danger hidden" style="padding: 0.5rem; font-size: 0.7rem; margin-left: 1rem;">Esci</button>
        </div>

        <div style="margin-bottom: 2rem;">
            <a href="public/assets/intro.mp4" target="_blank" class="btn" style="background: #9c27b0; text-decoration: none; display: inline-block;">▶ Guarda Video Promo</a>
        </div>

        <!-- AUTH SECTION -->
        <div id="section-auth" class="section-container">
            <h2>Account / Accesso</h2>
            <div class="form-group" style="margin-top: 1rem;">
                <input type="email" id="auth-email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="auth-password" placeholder="Password">
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <button id="btn-login" class="btn" style="flex:1;">Accedi</button>
                <button id="btn-register" class="btn" style="flex:1; background: #3f51b5;">Registrati</button>
            </div>
            <hr style="border-color: #333; margin: 1rem 0;">
            <button id="btn-guest" class="btn" style="width: 100%; background: var(--dead-gray);">Continua come Ospite</button>
        </div>

        <!-- JOIN ROOM SECTION -->
        <div id="section-join" class="section-container hidden">
            <h2>Unisciti a una Stanza</h2>
            <div class="form-group" style="margin-top: 1rem;">
                <input type="text" id="join-code" placeholder="Codice Stanza (es. ABCDE)" style="text-transform: uppercase;" maxlength="5">
            </div>
            <div class="form-group">
                <input type="text" id="join-name" placeholder="Il tuo Nome (Giocatore)" maxlength="15">
            </div>
            <button id="btn-join-room" class="btn" style="width: 100%; background: var(--accent-green);">ENTRA IN PARTITA</button>
        </div>

        <!-- CREATE ROOM SECTION -->
        <div id="section-create" class="section-container hidden">
            <h2>Crea Partita (Manager)</h2>
            <p style="font-size: 0.8rem; margin-bottom: 1rem; color: #aaa;">Crea una stanza e fai entrare i giocatori.</p>
            
            <div class="form-group">
                <label>Template Partita</label>
                <select id="template-select">
                    <option value="base">Standard Grest (Default)</option>
                    <option value="empty">Vuoto (Crea da zero)</option>
                    <!-- User templates populated dynamically -->
                </select>
            </div>
            
            <div class="form-group">
                <label>Numero Impostori</label>
                <input type="number" id="create-impostors" value="2" min="1" max="10">
            </div>

            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex:1;">
                    <label>Kill Cooldown (sec)</label>
                    <input type="number" id="create-kill-cooldown" value="120" min="10">
                </div>
                <div style="flex:1;">
                    <label>Riunioni per Player</label>
                    <input type="number" id="create-max-meetings" value="1" min="0">
                </div>
            </div>

            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex:1;">
                    <label>Durata Discussione (sec)</label>
                    <input type="number" id="create-meeting-duration" value="120" min="10">
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                <input type="checkbox" id="create-scientist" checked style="width: auto;">
                <label style="margin:0;">Abilita Scienziato</label>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                <input type="checkbox" id="create-video-intro" checked style="width: auto;">
                <label style="margin:0;">Mostra video su tutti all'avvio</label>
            </div>
            
            <div class="form-group" style="display: flex; gap: 1rem; margin-top: 1rem;">
                <div style="flex:1;">
                    <label>Limite Giocatori</label>
                    <input type="number" id="create-max-players" value="15" min="2" max="100">
                </div>
                <div style="display: flex; align-items: flex-end; padding-bottom: 0.5rem; gap: 0.5rem;">
                    <input type="checkbox" id="create-unlimited-players" style="width: auto;">
                    <label style="margin:0;">Unlimited</label>
                </div>
            </div>
            
            <hr style="border-color: #333; margin: 1.5rem 0;">

            <h3>Modalità Mappa (Esperti)</h3>
            <div class="form-group" style="display: flex; gap: 1rem; margin-top: 1rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor:pointer;">
                    <input type="radio" name="map-mode" value="photo" checked> Mappa Visiva (Foto)
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor:pointer;">
                    <input type="radio" name="map-mode" value="text"> Elenco Testuale
                </label>
            </div>

            <div id="map-photo-config" class="form-group">
                <label>Carica Immagine Mappa (verrà compressa)</label>
                <input type="file" id="map-image-upload" accept="image/jpeg, image/png">
                <canvas id="map-canvas" style="display:none;"></canvas>
                <p id="upload-status" style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--accent-cyan);"></p>
            </div>

            <div id="map-text-config" class="form-group hidden">
                <label>Configura Task Testuali</label>
                <div id="text-tasks-container"></div>
                <button id="btn-add-text-task" class="btn" style="padding: 0.5rem; font-size: 0.8rem; margin-top: 0.5rem;">+ Aggiungi Task</button>
            </div>

            <div class="form-group hidden" id="save-template-group" style="margin-top: 1rem;">
                <input type="text" id="template-name" placeholder="Nome Template da Salvare">
                <button id="btn-save-template" class="btn" style="width: 100%; background: #9c27b0; margin-top: 0.5rem;">Salva come Template</button>
            </div>
            
            <button id="btn-create-room" class="btn" style="width: 100%; margin-top: 1.5rem;">AVVIA STANZA</button>
        </div>
    </div>

    <script type="module" src="js/index.js"></script>
</body>
</html>
